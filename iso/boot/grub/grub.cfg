# GRUB configuration file
#
# WHAT IS GRUB?
#
# GNU GRUB (GRand Unified Bootloader) is the bootloader used by most
# Linux distributions. When your PC starts, the BIOS/UEFI loads GRUB,
# which then presents a menu and loads your OS kernel.
#
# This file tells GRUB how to boot our kernel.

# Time (in seconds) to show the menu before auto-booting
set timeout=3

# Default menu entry to boot (0 = first entry)
set default=0

# Menu entry for our kernel
menuentry "KernelOS" {
    # Tell GRUB to use Multiboot protocol
    multiboot /boot/kernel.elf

    # Boot the kernel
    boot
}
